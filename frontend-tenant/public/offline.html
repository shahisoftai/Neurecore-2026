<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeureCore — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #09090b;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }
    svg { opacity: 0.6; }
    h1 { font-size: 1.5rem; font-weight: 600; color: #a1a1aa; }
    p  { font-size: 0.95rem; color: #71717a; max-width: 28ch; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.6rem 1.5rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
       fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round">
    <path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/>
    <path d="M12 8v4m0 4h.01"/>
  </svg>
  <h1>You're offline</h1>
  <p>HeadQuarter can't reach the server. Check your connection and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
