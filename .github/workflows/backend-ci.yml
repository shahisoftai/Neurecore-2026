name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  quality-checks:
    name: Quality Checks (Phase 0 mandatory gates)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # MANDATORY GATE 1: prisma validate (schema internally consistent)
      - name: Gate 1 — prisma validate
        run: pnpm prisma validate

      # MANDATORY GATE 2: prisma generate (Prisma Client produced from schema)
      - name: Gate 2 — prisma generate
        run: pnpm prisma generate

      # MANDATORY GATE 3: tsc --noEmit (no typecheck errors in source)
      - name: Gate 3 — typecheck (npx tsc --noEmit)
        run: pnpm exec tsc --noEmit

      # Optional lint (informational, not blocking)
      - name: ESLint (informational)
        run: pnpm lint || true

      # MANDATORY GATE 4: build (Nest bundles successfully)
      - name: Gate 4 — npm run build
        run: pnpm build

      # Schema-shape enforcement (existing)
      - name: Check @@map() on all models
        run: |
          echo "Checking that every Prisma model has @@map()..."
          bash scripts/enforce-prisma-map.sh

      - name: Check enum case consistency
        run: |
          echo "Checking enum case consistency..."
          bash scripts/enforce-enum-case.sh

  tests:
    name: MANDATORY GATE 5 — tests
    runs-on: ubuntu-latest
    needs: quality-checks
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Gate 2 — prisma generate (re-run for tests)
        run: pnpm prisma generate

      - name: Gate 5 — npm test (runInBand, 100% required)
        run: pnpm test -- --runInBand

  # Optional, opt-in: real PostgreSQL tests for work-runtime and
  # approval-chains. These are GATED on DATABASE_TEST_URL being set at the
  # job level (operator secret). Without the secret they are skipped, so
  # the gating does not break the default CI pipeline.
  # Run by setting secrets:
  #   settings.DATABASE_TEST_URL (required)
  #   secrets.P4_PHASE_4_ENABLE_DB_TESTS = 'true'  (required to enable)
  p4-db-tests:
    name: P4 real-DB integration (opt-in)
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ secrets.P4_PHASE_4_ENABLE_DB_TESTS == 'true' }}
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_TEST_URL: ${{ secrets.DATABASE_TEST_URL }}
      P4_PHASE_4_ENABLE_DB_TESTS: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run real-DB tests (work-runtime + approval-chains)
        run: |
          pnpm prisma migrate deploy || pnpm prisma db push --skip-generate
          pnpm prisma generate
          pnpm test -- --runInBand --testPathPatterns 'work-runtime-db|approval-chains-db'
        env:
          DATABASE_TEST_URL: ${{ secrets.DATABASE_TEST_URL }}

  # Always-on companion: confirms that without DATABASE_TEST_URL the gated
  # suites are skipped (not failed). This is the safety net for the gating.
  p4-db-tests-skip-confirmed:
    name: P4 DB tests gating (always-on)
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ secrets.P4_PHASE_4_ENABLE_DB_TESTS != 'true' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Confirm gating skips when DATABASE_TEST_URL is unset
        run: |
          unset DATABASE_TEST_URL
          pnpm install --frozen-lockfile
          # Should report 14 skipped, not 0 tests found.
          pnpm test -- --runInBand --testPathPatterns 'work-runtime-db|approval-chains-db' 2>&1 | tee db-skip.out
          grep -q '14 skipped' db-skip.out || (echo "ERROR: DB suites were not skipped as expected" && exit 1)
        shell: bash
