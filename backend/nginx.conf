# NeureCore Backend — nginx Configuration
# Place this in: /etc/nginx/sites-available/neurecore-backend

upstream neurecore_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP to HTTPS (uncomment after SSL setup)
# server {
#     listen 80;
#     server_name api.guvhq.shahisoft.store;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment after SSL setup
    server_name api.guvhq.shahisoft.store;

    # SSL Configuration (Let's Encrypt - certbot will add these)
    # ssl_certificate /etc/letsencrypt/live/api.guvhq.shahisoft.store/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.guvhq.shahisoft.store/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/neurecore-backend.access.log;
    error_log /var/log/nginx/neurecore-backend.error.log warn;

    # Maximum upload size
    client_max_body_size 10M;

    # Root location - redirect to docs or health
    location = / {
        return 302 /api/health;
    }

    # Backend API
    location /api/ {
        proxy_pass http://neurecore_backend;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Disable buffering for real-time responses
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Keep-alive
        proxy_set_header Connection "";
    }

    # Socket.IO WebSocket endpoint
    location /socket.io/ {
        proxy_pass http://neurecore_backend;
        proxy_http_version 1.1;
        
        # WebSocket support (required)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeout (24 hours)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Don't buffer WebSocket frames
        proxy_buffering off;
    }

    # Health check endpoint (no auth required)
    location = /api/health {
        proxy_pass http://neurecore_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Short timeout for health checks
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        
        # Cache health responses briefly
        proxy_cache_valid 200 5s;
        access_log off;  # Don't log health checks
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ═══════════════════════════════════════════════════════════════════════════
# Installation Instructions:
# ═══════════════════════════════════════════════════════════════════════════
#
# 1. Copy this file to nginx sites-available:
#    sudo cp nginx.conf /etc/nginx/sites-available/neurecore-backend
#
# 2. Create symbolic link to enable:
#    sudo ln -s /etc/nginx/sites-available/neurecore-backend /etc/nginx/sites-enabled/
#
# 3. Test configuration:
#    sudo nginx -t
#
# 4. Restart nginx:
#    sudo systemctl restart nginx
#
# 5. Setup SSL with Let's Encrypt:
#    sudo certbot --nginx -d api.guvhq.shahisoft.store
#
#    Certbot will automatically:
#    - Add SSL certificates
#    - Add ssl_certificate and ssl_certificate_key directives
#    - Create HTTP → HTTPS redirect
#    - Set up auto-renewal via cron
#
# 6. Verify SSL:
#    curl -I https://api.guvhq.shahisoft.store/api/health
#
# ═══════════════════════════════════════════════════════════════════════════
