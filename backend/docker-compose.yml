services:
  postgres:
    image: postgres:16-alpine
    container_name: neurecore_postgres
    environment:
      POSTGRES_USER: neurecore
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neurecore_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurecore -d neurecore_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: neurecore_pgvector
    environment:
      POSTGRES_USER: neurecore
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neurecore_vectors
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurecore -d neurecore_vectors"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neurecore_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  pgvector_data:
  redis_data:
